name: Check Updates

'on':
  schedule:
    - cron: '0 16 */1 * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  UPSTREAM_REPO: QuantumNous/new-api

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: compare versions
        run: |
          export REMOTEVERSION=$(curl -fsSL "https://api.github.com/repos/${UPSTREAM_REPO}/tags?per_page=1" | python3 -c "import json,sys; data=json.load(sys.stdin); print(data[0]['name'])")
          export LOCALVERSION=$(curl --location --silent --fail --show-error "https://api.github.com/repos/k0baya/new-api-freebsd/releases/latest" | grep -oP '"tag_name":\s*"\K[^"]+')
          echo "Remote version: $REMOTEVERSION"
          echo "Local version: $LOCALVERSION"
          bash compare.sh
          
      - name: Trigger release
        if: ${{ env.SYNCED == '0' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
              await github.rest.actions.createWorkflowDispatch({
              owner: 'k0baya',
              repo: 'new-api-freebsd',
              workflow_id: 'build.yml',
              ref: 'main'
              })
              
      - name: Delete workflow runs
        if: ${{ env.SYNCED == '1' }}
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 8
