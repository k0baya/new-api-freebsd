name: Build new-api

'on': workflow_dispatch

permissions:
  contents: write
  actions: write

env:
  UPSTREAM_REPO: QuantumNous/new-api

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build new-api
    steps:
    
      - uses: actions/checkout@v4
    
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve upstream tag
        id: upstream
        run: |
          tag="$(curl -fsSL "https://api.github.com/repos/${UPSTREAM_REPO}/tags?per_page=1" | python3 -c "import json,sys; data=json.load(sys.stdin); print(data[0]['name'])")"
          if [ -z "$tag" ]; then
            echo "::error::Failed to resolve latest upstream tag"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved upstream tag: $tag"

      - name: Clone Repo
        run: |
          git clone --depth 1 --branch "${{ steps.upstream.outputs.tag }}" "https://github.com/${UPSTREAM_REPO}.git" new-api

      - name: Build Frontend (default)
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd new-api/web/default
          bun install
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION="${{ steps.upstream.outputs.tag }}" bun run build
          cd ../../..

      - name: Build Frontend (classic)
        env:
          CI: ""
        run: |
          cd new-api/web/classic
          bun install
          VITE_REACT_APP_VERSION="${{ steps.upstream.outputs.tag }}" bun run build
          cd ../../..

      - name: Build Backend
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          release: 13.2
          prepare: |
            pkg install -y jq wget curl git gcc bash gawk gsed
            wget https://dl.google.com/go/go1.25.6.freebsd-amd64.tar.gz && tar -C /usr/local -xzf go1.25.6.freebsd-amd64.tar.gz && rm go1.25.6.freebsd-amd64.tar.gz
            ln -s /usr/local/go/bin/go /usr/local/bin/go
          # curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          # echo '. $HOME/.cargo/env' >> ~/.bashrc
          # . "$HOME/.cargo/env"
          run: |
            git config --global --add safe.directory /home/runner/work/new-api-freebsd/new-api-freebsd/new-api
            cd new-api
            go mod download
            go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=${{ steps.upstream.outputs.tag }}' -extldflags '-static'" -o new-api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-freebsd
          path: |
              new-api/new-api
  
      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.upstream.outputs.tag }}
          files: |
                new-api/new-api
              
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 8
